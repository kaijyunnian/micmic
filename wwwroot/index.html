<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SketchUp Mimic</title>
<style>
  html, body { margin:0; height:100%; font-family: Segoe UI, system-ui, sans-serif; background:#1e1e1e; color:#ddd; overflow:hidden; }
  #toolbar { display:flex; gap:6px; padding:6px 10px; background:#2b2b2b; border-bottom:1px solid #444; align-items:center; flex-wrap:wrap; }
  #toolbar button, #toolbar select { background:#3c3c3c; color:#eee; border:1px solid #555; padding:6px 10px; border-radius:4px; cursor:pointer; font-size:13px; }
  #toolbar button.active { background:#0a73c1; border-color:#0a8fea; }
  #toolbar button:hover { background:#4a4a4a; }
  #toolbar .sep { width:1px; height:22px; background:#555; margin:0 4px; }
  #toolbar .label { color:#aaa; font-size:12px; margin-right:4px; }
  #main { display:flex; height:calc(100% - 44px); }
  #left, #right { flex:1; position:relative; min-width:0; }
  #left { background:#fafafa; border-right:2px solid #444; }
  #right { background:#202830; }
  #canvas2d { width:100%; height:100%; display:block; cursor:crosshair; }
  #canvas3d { width:100%; height:100%; display:block; }
  #status { position:absolute; left:8px; bottom:6px; font-size:12px; color:#444; background:rgba(255,255,255,0.7); padding:2px 6px; border-radius:3px; pointer-events:none; }
  #status3d { position:absolute; left:8px; bottom:6px; font-size:12px; color:#bcd; background:rgba(0,0,0,0.4); padding:2px 6px; border-radius:3px; pointer-events:none; }
</style>
</head>
<body>
<div id="toolbar">
  <span class="label">Tool:</span>
  <button id="btnDraw" class="active">✏️ Draw Edge</button>
  <button id="btnLight">💡 Place Lighter</button>
  <button id="btnMove">✋ Move Lighter</button>
  <button id="btnErase">🗑 Erase</button>
  <span class="sep"></span>
  <button id="btnUndo">↶ Undo</button>
  <button id="btnRedo">↷ Redo</button>
  <span class="sep"></span>
  <button id="btnRender" class="active">🌞 Render Lights: ON</button>
  <button id="btnSave">📷 Save JPG</button>
  <button id="btnClear">🧹 Clear</button>
  <span class="sep"></span>
  <span class="label">Snap (px):</span>
  <select id="snapSel">
    <option>8</option><option selected>14</option><option>22</option><option>32</option>
  </select>
</div>
<div id="main">
  <div id="left">
    <canvas id="canvas2d"></canvas>
    <div id="status">Click to start an edge, click again to finish. New points snap to existing points / edges.</div>
  </div>
  <div id="right">
    <canvas id="canvas3d"></canvas>
    <div id="status3d">Drag = orbit · Wheel = zoom · Right-drag = pan</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ------------------------------------------------------------------ */
/* Model                                                              */
/* ------------------------------------------------------------------ */
const model = {
  points: [],   // {id,x,y}
  edges:  [],   // {id,a,b}
  lights: [],   // {id,x,y,intensity,color}
  nextId: 1,
};
let history = [];
let future  = [];

function snapshot() {
  history.push(JSON.stringify(model));
  if (history.length > 200) history.shift();
  future.length = 0;
}
function undo() {
  if (history.length < 2) return;
  future.push(history.pop());
  Object.assign(model, JSON.parse(history[history.length-1]));
  redraw();
}
function redo() {
  if (!future.length) return;
  const s = future.pop();
  history.push(s);
  Object.assign(model, JSON.parse(s));
  redraw();
}
function commit() { snapshot(); redraw(); }

/* ------------------------------------------------------------------ */
/* 2D drawing panel                                                   */
/* ------------------------------------------------------------------ */
const canvas2d = document.getElementById('canvas2d');
const ctx = canvas2d.getContext('2d');
let pendingPoint = null;   // first point while drawing edge
let hoverPos = null;
let movingLight = null;
let tool = 'draw';

function resize2d() {
  const r = canvas2d.parentElement.getBoundingClientRect();
  canvas2d.width  = r.width;
  canvas2d.height = r.height;
  redraw();
}
window.addEventListener('resize', () => { resize2d(); resize3d(); });

function getMouse(e) {
  const r = canvas2d.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function snapDist() { return parseFloat(document.getElementById('snapSel').value); }

function findNearestPoint(p, maxD) {
  let best=null, bd=maxD;
  for (const pt of model.points) {
    const d = Math.hypot(pt.x-p.x, pt.y-p.y);
    if (d < bd) { bd=d; best=pt; }
  }
  return best;
}
function projectOnSegment(p, a, b) {
  const vx=b.x-a.x, vy=b.y-a.y, L2=vx*vx+vy*vy;
  if (L2 < 1e-6) return { x:a.x, y:a.y, t:0 };
  let t = ((p.x-a.x)*vx + (p.y-a.y)*vy) / L2;
  t = Math.max(0, Math.min(1, t));
  return { x:a.x+vx*t, y:a.y+vy*t, t };
}
function findNearestEdge(p, maxD) {
  let best=null, bd=maxD, bproj=null;
  for (const e of model.edges) {
    const a = pointById(e.a), b = pointById(e.b);
    const pr = projectOnSegment(p, a, b);
    const d = Math.hypot(pr.x-p.x, pr.y-p.y);
    if (d < bd && pr.t > 0.05 && pr.t < 0.95) { bd=d; best=e; bproj=pr; }
  }
  return best ? { edge:best, proj:bproj } : null;
}
function pointById(id) { return model.points.find(p=>p.id===id); }

function snapPoint(p) {
  const sd = snapDist();
  const np = findNearestPoint(p, sd);
  if (np) return { point: np };
  const ne = findNearestEdge(p, sd);
  if (ne) return { onEdge: ne };
  return { free: p };
}

function addPoint(x, y) {
  const id = model.nextId++;
  const pt = { id, x, y };
  model.points.push(pt);
  return pt;
}
function addEdge(a, b) {
  if (a.id === b.id) return null;
  if (model.edges.some(e => (e.a===a.id&&e.b===b.id)||(e.a===b.id&&e.b===a.id))) return null;
  const e = { id: model.nextId++, a:a.id, b:b.id };
  model.edges.push(e);
  return e;
}
function splitEdgeAt(edge, proj) {
  const newPt = addPoint(proj.x, proj.y);
  const a = edge.a, b = edge.b;
  model.edges = model.edges.filter(e => e !== edge);
  addEdge(pointById(a), newPt);
  addEdge(newPt, pointById(b));
  return newPt;
}

function resolveClick(p) {
  const s = snapPoint(p);
  if (s.point) return s.point;
  if (s.onEdge) return splitEdgeAt(s.onEdge.edge, s.onEdge.proj);
  return addPoint(p.x, p.y);
}

canvas2d.addEventListener('mousemove', e => {
  hoverPos = getMouse(e);
  if (movingLight) {
    movingLight.x = hoverPos.x; movingLight.y = hoverPos.y;
    redraw();
    return;
  }
  redraw();
});
canvas2d.addEventListener('mousedown', e => {
  const p = getMouse(e);
  if (e.button === 2) { pendingPoint = null; redraw(); return; }
  if (tool === 'draw') {
    const pt = resolveClick(p);
    if (!pendingPoint) {
      pendingPoint = pt;
    } else {
      addEdge(pendingPoint, pt);
      pendingPoint = null;
      commit();
    }
  } else if (tool === 'light') {
    const id = model.nextId++;
    model.lights.push({ id, x:p.x, y:p.y, intensity: 1.2, color: '#ffe6b3' });
    commit();
  } else if (tool === 'move') {
    movingLight = nearestLight(p, 18);
    if (!movingLight) return;
  } else if (tool === 'erase') {
    const li = nearestLight(p, 14);
    if (li) { model.lights = model.lights.filter(l=>l!==li); commit(); return; }
    const pt = findNearestPoint(p, 12);
    if (pt) {
      model.points = model.points.filter(x=>x!==pt);
      model.edges  = model.edges.filter(e=>e.a!==pt.id && e.b!==pt.id);
      commit(); return;
    }
    const ne = findNearestEdge(p, 8);
    if (ne) { model.edges = model.edges.filter(e=>e!==ne.edge); commit(); }
  }
});
canvas2d.addEventListener('mouseup', () => {
  if (movingLight) { movingLight = null; commit(); }
});
canvas2d.addEventListener('contextmenu', e => e.preventDefault());

function nearestLight(p, maxD) {
  let best=null, bd=maxD;
  for (const l of model.lights) {
    const d = Math.hypot(l.x-p.x, l.y-p.y);
    if (d < bd) { bd=d; best=l; }
  }
  return best;
}

/* ------------------------------------------------------------------ */
/* Planar face detection (combinatorial embedding)                    */
/* ------------------------------------------------------------------ */
function detectFaces() {
  // Build adjacency with angular ordering at each vertex.
  const adj = new Map();           // pid -> sorted [{to, angle}]
  for (const p of model.points) adj.set(p.id, []);
  for (const e of model.edges) {
    const A = pointById(e.a), B = pointById(e.b);
    if (!A || !B) continue;
    adj.get(A.id).push({ to:B.id, angle: Math.atan2(B.y-A.y, B.x-A.x) });
    adj.get(B.id).push({ to:A.id, angle: Math.atan2(A.y-B.y, A.x-B.x) });
  }
  for (const arr of adj.values()) arr.sort((a,b)=>a.angle-b.angle);

  // For each directed edge u->v, next around face at v is the edge
  // immediately CW (previous in CCW sort) before reverse v->u.
  function nextEdge(u, v) {
    const list = adj.get(v);
    const idx = list.findIndex(x => x.to === u);
    if (idx < 0) return null;
    const nxt = list[(idx - 1 + list.length) % list.length];
    return { from: v, to: nxt.to };
  }

  const visited = new Set(); // "u-v"
  const faces = [];
  for (const e of model.edges) {
    for (const [u,v] of [[e.a,e.b],[e.b,e.a]]) {
      if (visited.has(u+'-'+v)) continue;
      const cycle = [];
      let cu = u, cv = v, guard = 0;
      while (guard++ < 10000) {
        if (visited.has(cu+'-'+cv)) break;
        visited.add(cu+'-'+cv);
        cycle.push(cu);
        const nx = nextEdge(cu, cv);
        if (!nx) { cycle.length = 0; break; }
        cu = nx.from; cv = nx.to;
        if (cu === u && cv === v) break;
      }
      if (cycle.length >= 3) faces.push(cycle);
    }
  }
  // Remove the outer face. With CCW angular sort + "previous in sort before
  // reverse edge" traversal, inner faces are traversed so that, in screen
  // coords (y-down), their signed area is positive; the outer face is negative.
  return faces.filter(f => signedArea(f) > 0);
}
function signedArea(cycle) {
  let s = 0;
  for (let i=0; i<cycle.length; i++) {
    const a = pointById(cycle[i]);
    const b = pointById(cycle[(i+1)%cycle.length]);
    s += (a.x*b.y - b.x*a.y);
  }
  return s * 0.5;
}

/* ------------------------------------------------------------------ */
/* 2D rendering                                                       */
/* ------------------------------------------------------------------ */
function redraw() {
  ctx.clearRect(0,0,canvas2d.width,canvas2d.height);
  // grid
  ctx.strokeStyle = '#e6e6e6'; ctx.lineWidth = 1;
  for (let x=0; x<canvas2d.width; x+=20) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas2d.height); ctx.stroke();
  }
  for (let y=0; y<canvas2d.height; y+=20) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas2d.width,y); ctx.stroke();
  }

  // faces
  const faces = detectFaces();
  ctx.fillStyle = 'rgba(120,170,230,0.25)';
  for (const f of faces) {
    ctx.beginPath();
    f.forEach((id,i)=>{ const p=pointById(id); if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
    ctx.closePath(); ctx.fill();
  }

  // edges
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1.6;
  for (const e of model.edges) {
    const a = pointById(e.a), b = pointById(e.b);
    if (!a||!b) continue;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }

  // points
  for (const p of model.points) {
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
  }

  // lights (different sized icons by intensity)
  for (const l of model.lights) {
    const r = 6 + l.intensity*3;
    const g = ctx.createRadialGradient(l.x,l.y,1, l.x,l.y,r*2);
    g.addColorStop(0, l.color);
    g.addColorStop(1, 'rgba(255,200,100,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(l.x,l.y,r*2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = l.color;
    ctx.strokeStyle = '#a86';
    ctx.beginPath(); ctx.arc(l.x,l.y,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#000'; ctx.font='10px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('💡', l.x, l.y+1);
  }

  // pending edge preview + snap indicator
  if (hoverPos) {
    const s = snapPoint(hoverPos);
    let target = hoverPos;
    if (s.point) { target = s.point; ctx.strokeStyle='#0a8'; ctx.beginPath(); ctx.arc(target.x,target.y,7,0,Math.PI*2); ctx.stroke(); }
    else if (s.onEdge) { target = s.onEdge.proj; ctx.strokeStyle='#08a'; ctx.beginPath(); ctx.arc(target.x,target.y,6,0,Math.PI*2); ctx.stroke(); }
    if (tool==='draw' && pendingPoint) {
      ctx.strokeStyle='#0a73c1'; ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(pendingPoint.x,pendingPoint.y); ctx.lineTo(target.x,target.y); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  syncThree();
}

/* ------------------------------------------------------------------ */
/* three.js 3D view                                                   */
/* ------------------------------------------------------------------ */
const canvas3d = document.getElementById('canvas3d');
const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias:true, preserveDrawingBuffer:true });
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(window.devicePixelRatio);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202830);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 5000);
camera.position.set(400, 400, 600);

const controls = new OrbitControls(camera, canvas3d);
controls.enableDamping = true;

const ambient = new THREE.AmbientLight(0xffffff, 0.25);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 0.4);
sun.position.set(300, 600, 200);
sun.castShadow = true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left=-800; sun.shadow.camera.right=800;
sun.shadow.camera.top=800; sun.shadow.camera.bottom=-800;
sun.shadow.camera.near=1; sun.shadow.camera.far=2000;
scene.add(sun);

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(4000, 4000),
  new THREE.MeshStandardMaterial({ color: 0xdedede })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Axes helper for orientation
scene.add(new THREE.AxesHelper(80));

const dynamicGroup = new THREE.Group();
scene.add(dynamicGroup);

let lightingOn = true;

function clearGroup(g) {
  while (g.children.length) {
    const c = g.children.pop();
    c.traverse?.(o => { o.geometry?.dispose?.(); o.material?.dispose?.(); });
  }
}

function syncThree() {
  clearGroup(dynamicGroup);

  // Map 2D coords to 3D (x,z), centered on canvas
  const cx = canvas2d.width/2, cy = canvas2d.height/2;
  const to3 = (p) => new THREE.Vector2(p.x - cx, -(p.y - cy));

  // Faces
  const faces = detectFaces();
  for (const f of faces) {
    const shape = new THREE.Shape(f.map(id => to3(pointById(id))));
    const geom = new THREE.ShapeGeometry(shape);
    geom.rotateX(-Math.PI/2);
    geom.translate(0, 0.5, 0);
    const mat = lightingOn
      ? new THREE.MeshStandardMaterial({ color: 0xa9c6e8, roughness: 0.7, metalness: 0.05, side: THREE.DoubleSide })
      : new THREE.MeshBasicMaterial({ color: 0x88aacc, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.castShadow = lightingOn;
    mesh.receiveShadow = lightingOn;
    dynamicGroup.add(mesh);
  }

  // Edges as thin lines floating slightly above faces
  const edgeMat = new THREE.LineBasicMaterial({ color: 0x111111 });
  for (const e of model.edges) {
    const a = pointById(e.a), b = pointById(e.b); if (!a||!b) continue;
    const pa = to3(a), pb = to3(b);
    const geom = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(pa.x, 1.0, -pa.y),
      new THREE.Vector3(pb.x, 1.0, -pb.y),
    ]);
    dynamicGroup.add(new THREE.Line(geom, edgeMat));
  }

  // Lights placed by user
  ambient.intensity = lightingOn ? 0.25 : 1.0;
  sun.intensity     = lightingOn ? 0.4  : 0.0;
  for (const l of model.lights) {
    const v = to3(l);
    if (lightingOn) {
      const pl = new THREE.PointLight(new THREE.Color(l.color), l.intensity*1.8, 1200, 2);
      pl.position.set(v.x, 140, -v.y);
      pl.castShadow = true;
      pl.shadow.mapSize.set(512,512);
      dynamicGroup.add(pl);
    }
    // bulb marker
    const bulb = new THREE.Mesh(
      new THREE.SphereGeometry(6, 12, 12),
      new THREE.MeshBasicMaterial({ color: l.color })
    );
    bulb.position.set(v.x, 140, -v.y);
    dynamicGroup.add(bulb);
    // stand line
    const stand = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(v.x, 0, -v.y),
      new THREE.Vector3(v.x, 140, -v.y),
    ]);
    dynamicGroup.add(new THREE.Line(stand, new THREE.LineBasicMaterial({ color: 0x886633 })));
  }
}

function resize3d() {
  const r = canvas3d.parentElement.getBoundingClientRect();
  renderer.setSize(r.width, r.height, false);
  camera.aspect = r.width / r.height;
  camera.updateProjectionMatrix();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

/* ------------------------------------------------------------------ */
/* Toolbar wiring                                                     */
/* ------------------------------------------------------------------ */
const buttons = {
  draw:  document.getElementById('btnDraw'),
  light: document.getElementById('btnLight'),
  move:  document.getElementById('btnMove'),
  erase: document.getElementById('btnErase'),
};
function setTool(t) {
  tool = t; pendingPoint = null;
  for (const k in buttons) buttons[k].classList.toggle('active', k===t);
  canvas2d.style.cursor = (t==='draw')?'crosshair':(t==='erase')?'not-allowed':'pointer';
  redraw();
}
buttons.draw.onclick  = ()=>setTool('draw');
buttons.light.onclick = ()=>setTool('light');
buttons.move.onclick  = ()=>setTool('move');
buttons.erase.onclick = ()=>setTool('erase');

document.getElementById('btnUndo').onclick = undo;
document.getElementById('btnRedo').onclick = redo;
document.getElementById('btnClear').onclick = () => {
  model.points.length=0; model.edges.length=0; model.lights.length=0;
  pendingPoint=null; commit();
};

const btnRender = document.getElementById('btnRender');
btnRender.onclick = () => {
  lightingOn = !lightingOn;
  btnRender.textContent = '🌞 Render Lights: ' + (lightingOn?'ON':'OFF');
  btnRender.classList.toggle('active', lightingOn);
  syncThree();
};

document.getElementById('btnSave').onclick = () => {
  renderer.render(scene, camera);
  // Composite onto white to flatten alpha for JPEG
  const tmp = document.createElement('canvas');
  tmp.width = canvas3d.width; tmp.height = canvas3d.height;
  const tctx = tmp.getContext('2d');
  tctx.fillStyle = '#ffffff'; tctx.fillRect(0,0,tmp.width,tmp.height);
  tctx.drawImage(canvas3d, 0, 0);
  const url = tmp.toDataURL('image/jpeg', 0.92);
  const a = document.createElement('a');
  a.href = url; a.download = 'sketchup_mimic_'+Date.now()+'.jpg';
  document.body.appendChild(a); a.click(); a.remove();
};

window.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='z') { e.preventDefault(); e.shiftKey?redo():undo(); }
  if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='y') { e.preventDefault(); redo(); }
  if (e.key === 'Escape') { pendingPoint = null; redraw(); }
});

/* ------------------------------------------------------------------ */
/* Boot                                                               */
/* ------------------------------------------------------------------ */
snapshot();
resize2d();
resize3d();
animate();
</script>
</body>
</html>
